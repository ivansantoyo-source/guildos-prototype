# ============================================================================
# GUILDOS — Supabase Configuration
# Isolated guildos_core schema for co-hosted free-tier database
# ============================================================================

[db]
# Only expose guildos_core via PostgREST (plus auth for JWT)
schemas = ["guildos_core", "public", "auth", "storage"]

[api]
schemas = ["guildos_core", "public", "auth", "storage"]
extra_search_path = ["public", "extensions", "guildos_core"]
max_rows = 1000

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.guildos.com", "http://*.localhost:3000"]
enable_signup = true
