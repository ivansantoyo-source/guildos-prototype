<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your GuildOS Verification Code</title>
</head>
<body style="margin:0; padding:40px 16px; background:#0a0a1a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px; margin:0 auto;">
    <tr>
      <td style="background:rgba(255,255,255,0.03); border:1px solid rgba(0,255,136,0.15); border-radius:16px; padding:32px; text-align:center;">

        <!-- Logo / Header -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="text-align:center; padding-bottom:20px;">
              <span style="font-size:28px;">🏰</span>
              <h1 style="margin:8px 0 4px; color:#00ff88; font-size:22px; font-weight:700; letter-spacing:2px;">GUILD_OS</h1>
              <p style="margin:0; color:#64748b; font-size:13px;">Verification required</p>
            </td>
          </tr>
        </table>

        <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:0 0 24px;">

        <!-- Body -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="color:#e2e8f0; font-size:14px; line-height:1.6;">
              <p style="margin:0 0 20px;">Use this verification code to sign in to <strong style="color:#00ff88;">{{ .Email }}</strong>:</p>

              <!-- OTP Code -->
              <div style="background:rgba(0,255,136,0.05); border:1px solid rgba(0,255,136,0.15); border-radius:12px; padding:20px; margin-bottom:20px;">
                <span style="font-size:40px; font-weight:700; letter-spacing:12px; color:#ffd700; font-family:'Courier New',Courier,monospace;">{{ .Token }}</span>
              </div>

              <p style="margin:0; color:#64748b; font-size:12px;">This code expires in 1 hour. If you didn't request this code, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>

        <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:24px 0 16px;">

        <!-- Footer -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="text-align:center; color:#334155; font-size:11px;">
              <p style="margin:0;">GuildOS &mdash; Powering the retro gaming revolution</p>
              <p style="margin:4px 0 0;">
                <a href="{{ .SiteURL }}" style="color:#00ff88; text-decoration:none;">{{ .SiteURL }}</a>
              </p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
